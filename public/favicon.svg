<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sun Core (Bigger Radius) -->
  <circle cx="256" cy="256" r="120" stroke="#fbbf24" stroke-width="16" fill="rgba(251,191,36,0.1)"/>
  
  <!-- Rays (Pushed closer to edges) -->
  <g stroke="white" stroke-width="16" stroke-linecap="round">
    <line x1="256" y1="20"  x2="256" y2="70"/>
    <line x1="256" y1="442" x2="256" y2="492"/>
    <line x1="20"  y1="256" x2="70"  y2="256"/>
    <line x1="442" y1="256" x2="492" y2="256"/>
    
    <line x1="85"  y1="85"  x2="125" y2="125"/>
    <line x1="387" y1="387" x2="427" y2="427"/>
    <line x1="85"  y1="427" x2="125" y2="387"/>
    <line x1="387" y1="125" x2="427" y2="85"/>
  </g>
  
  <!-- Center Glow -->
  <circle cx="256" cy="256" r="60" fill="#fbbf24" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>